<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קביעת פגישה | HK קבוצת חזות קריספין</title>
  <meta name="description" content="קבעו פגישת ייעוץ ראשונית עם HK קבוצת חזות קריספין – ללא עלות וללא התחייבות." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <header class="site-header" id="site-header">
    <div class="container">
      <nav class="nav">
        <a href="index.html" class="nav__logo">
          <span class="nav__logo-hk">HK</span>
          <span class="nav__logo-text">חזות קריספין</span>
        </a>
        <ul class="nav__links" id="nav-links">
          <li><a href="index.html">בית</a></li>
          <li><a href="index.html#products">מוצרים</a></li>
          <li><a href="meeting.html" class="btn btn--salmon active" style="padding:8px 22px;font-size:.9rem;">קביעת פגישה</a></li>
        </ul>
        <button class="nav__toggle" id="nav-toggle" aria-label="תפריט">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </div>
  </header>

  <div class="meeting-wrap">
    <div class="container">
      <div class="meeting-card">
        <span class="section-tag">ללא עלות וללא התחייבות</span>
        <h1 class="meeting-card__title">קבעו פגישה איתנו</h1>
        <p class="meeting-card__sub">
          מלאו את הפרטים ונחזור אליכם תוך 24 שעות לתיאום מועד נוח.
          הפגישה הראשונה היא ללא עלות – רק שיחה כנה על העסק שלכם.
        </p>

        <form>
          <div class="form-group">
            <label for="fname">שם פרטי *</label>
            <input type="text" id="fname" name="fname" placeholder="ישראל" required />
          </div>
          <div class="form-group">
            <label for="phone">טלפון *</label>
            <input type="tel" id="phone" name="phone" placeholder="050-0000000" dir="ltr" required />
          </div>
          <div class="form-group">
            <label for="email">דוא"ל</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" dir="ltr" />
          </div>
          <div class="form-group">
            <label for="business">שם העסק / תחום</label>
            <input type="text" id="business" name="business" placeholder="למשל: חנות אופנה, חברת הייטק..." />
          </div>
          <div class="form-group">
            <label for="service">במה אנחנו יכולים לעזור?</label>
            <select id="service" name="service">
              <option value="">בחרו נושא...</option>
              <option value="strategic">ייעוץ עסקי אסטרטגי</option>
              <option value="flow">HK-Money – ניהול תזרים</option>
              <option value="personal">ניהול פיננסי אישי</option>
              <option value="other">אחר / לא בטוח</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">ספרו לנו בקצרה</label>
            <textarea id="message" name="message" placeholder="מה האתגר העיקרי שאתם מתמודדים איתו?"></textarea>
          </div>
          <button type="submit" class="btn btn--salmon" style="width:100%;padding:14px;font-size:1.05rem;">שלחו ונחזור אליכם</button>
          <p style="text-align:center;font-size:.85rem;color:var(--muted);margin-top:16px;">
            או התקשרו ישירות: <a href="tel:+972559647897" style="color:var(--blue);font-weight:600;direction:ltr;display:inline-block;">055-964-7897</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__copy" style="border:none;padding:24px 0;margin:0;">
        © 2025 HK קבוצת חזות קריספין. כל הזכויות שמורות.
      </div>
    </div>
  </footer>

  <a class="whatsapp-float" href="https://wa.me/972559647897" target="_blank" rel="noopener" aria-label="WhatsApp">

  <script>
    const header = document.getElementById('site-header');
    window.addEventListener('scroll', () => { header.style.boxShadow = window.scrollY > 10 ? '0 4px 20px rgba(0,0,0,.12)' : '0 2px 12px rgba(0,0,0,.06)'; });
    const toggle = document.getElementById('nav-toggle');
    const links  = document.getElementById('nav-links');
    toggle.addEventListener('click', () => links.classList.toggle('open'));
    links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => links.classList.remove('open')));
  </script>
</body>
</html>
